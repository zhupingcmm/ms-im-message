version: "3.8"

# 本地开发用中间件：MySQL + Redis + Nacos + Kafka(KRaft) + MinIO
# 启动： docker compose up -d
#
# ⚠️  本文件仅用于本地开发。生产环境请用 k8s-install/middleware/ 下的
# StatefulSet 部署到 K8s 集群（详见 docs/07-deployment.md）。
services:
  mysql:
    image: mysql:8.0
    container_name: im-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Admin_1234
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d
      - im-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pAdmin_1234"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: im-redis
    ports:
      - "6379:6379"
    volumes:
      - im-redis-data:/data

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: im-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      - mysql

  minio:
    image: minio/minio:latest
    container_name: im-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API（im-media 预签名直传）
      - "9001:9001"   # 控制台
    volumes:
      - im-minio-data:/data

  kafka:
    image: bitnami/kafka:3.7
    container_name: im-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft 单节点模式（无需 zookeeper）
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://8.153.38.116:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - im-kafka-data:/bitnami/kafka

volumes:
  im-mysql-data:
  im-redis-data:
  im-kafka-data:
  im-minio-data:
