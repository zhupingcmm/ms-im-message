version: "3.8"

# P0 中间件：MySQL + Redis + Nacos + Kafka(KRaft)
# 启动： docker compose up -d
services:
  mysql:
    image: mysql:8.0
    container_name: im-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Admin_1234
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d
      - im-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pAdmin_1234"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: im-redis
    ports:
      - "6379:6379"
    volumes:
      - im-redis-data:/data

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: im-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      - mysql

  kafka:
    image: bitnami/kafka:3.7
    container_name: im-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft 单节点模式（无需 zookeeper）
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - im-kafka-data:/bitnami/kafka

volumes:
  im-mysql-data:
  im-redis-data:
  im-kafka-data:
