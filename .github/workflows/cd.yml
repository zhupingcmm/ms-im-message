name: CD

# 持续部署：打 v* tag 触发，或手动 workflow_dispatch
# 构建 6 个服务的镜像，推送到阿里云 ACR，再 kubectl apply 到 K8s
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: 'Tag 后缀（用于手动发布，可留空）'
        required: false
        default: ''

concurrency:
  group: cd-prod
  cancel-in-progress: false   # 部署不可被打断

env:
  JAVA_VERSION: 17
  REGISTRY: registry.cn-hangzhou.aliyuncs.com   # 阿里云 ACR
  NAMESPACE: im-prod                             # ACR 命名空间（与 K8s namespace 区分）
  IMAGE_PREFIX: im                               # 镜像名前缀
  K8S_NAMESPACE: im                              # K8s namespace
  SERVICES: im-user,im-message,im-connect,im-gateway,im-media,im-push

jobs:
  # ----------------------------------------------------------------
  # Job 1: 并行构建并推送 6 个服务镜像到阿里云 ACR
  # ----------------------------------------------------------------
  build-images:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(format('["{0}"]', join('","', split(env.SERVICES, ',')))) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          cache-key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          cache-restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Maven build (only this module)
        run: ./mvnw -B -e -ntp -DskipTests -pl ${{ matrix.service }} -am package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Determine image tags
        id: tags
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            PRIMARY_TAG="${{ github.ref_name }}"
          else
            SUFFIX="${{ github.event.inputs.tag_suffix }}"
            PRIMARY_TAG="dispatch-${SUFFIX:-$(date -u +%Y%m%d-%H%M%S)}"
          fi
          SHA_TAG="sha-${GITHUB_SHA::7}"
          echo "primary=${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "Image: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${PRIMARY_TAG}"

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.tags.outputs.primary }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.tags.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Output image digest
        run: |
          echo "Pushed: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.tags.outputs.primary }}"

  # ----------------------------------------------------------------
  # Job 2: 部署到 K8s
  # ----------------------------------------------------------------
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: build-images
    timeout-minutes: 15
    environment:
      name: production
      url: https://im.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine release tag
        id: release
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            SUFFIX="${{ github.event.inputs.tag_suffix }}"
            echo "tag=dispatch-${SUFFIX:-$(date -u +%Y%m%d-%H%M%S)}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl version --client
          kubectl cluster-info

      - name: Update Kustomize image tags
        working-directory: k8s-install/overlays/prod
        run: |
          # 安装 kustomize（如未自带）
          if ! command -v kustomize &> /dev/null; then
            echo "::warning::kustomize not found, falling back to kubectl -k"
          fi
          TAG="${{ steps.release.outputs.tag }}"
          SERVICES_STR="${{ env.SERVICES }}"
          IFS=',' read -ra SVC_ARR <<< "$SERVICES_STR"
          for svc in "${SVC_ARR[@]}"; do
            FULL_IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_PREFIX }}-${svc}:${TAG}"
            echo "Setting ${svc} -> ${FULL_IMAGE}"
            kustomize edit set image "${svc}=${FULL_IMAGE}" 2>/dev/null || \
              kubectl kustomize edit set image "${svc}=${FULL_IMAGE}" 2>/dev/null || \
              sed -i "s|newName: .*|newName: ${FULL_IMAGE%|*}|g; s|newTag: .*|newTag: ${TAG}|g" kustomization.yaml
          done

      - name: Commit updated kustomization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s-install/overlays/prod/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No kustomization changes to commit"
          else
            git commit -m "cd: bump image tags to ${{ steps.release.outputs.tag }}"
            git push
          fi

      - name: Apply manifests
        run: |
          kubectl apply -k k8s-install/overlays/prod
          echo "---"
          kubectl -n ${{ env.K8S_NAMESPACE }} get deploy,svc,ing

      - name: Wait for rollout
        run: |
          SERVICES_STR="${{ env.SERVICES }}"
          IFS=',' read -ra SVC_ARR <<< "$SERVICES_STR"
          for svc in "${SVC_ARR[@]}"; do
            echo ">>> Rolling out $svc"
            kubectl -n ${{ env.K8S_NAMESPACE }} \
              rollout status deploy/"$svc" --timeout=5m
          done

      - name: Smoke test
        run: |
          echo ">>> Hitting /actuator/health on each service"
          SERVICES_STR="${{ env.SERVICES }}"
          IFS=',' read -ra SVC_ARR <<< "$SERVICES_STR"
          for svc in "${SVC_ARR[@]}"; do
            echo "--- $svc ---"
            kubectl -n ${{ env.K8S_NAMESPACE }} \
              exec deploy/"$svc" -- \
              wget -qO- "http://localhost:8080/actuator/health" 2>/dev/null \
              || kubectl -n ${{ env.K8S_NAMESPACE }} \
              exec deploy/"$svc" -- \
              curl -sf "http://localhost:8080/actuator/health" 2>/dev/null \
              || echo "skip (no curl/wget in distroless)"
          done
