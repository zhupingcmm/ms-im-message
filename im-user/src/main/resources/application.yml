server:
  port: 8081

spring:
  application:
    name: im-user
  datasource:
    url: jdbc:mysql://${DB_HOST:8.153.38.116:3306}/im_user?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Admin_1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:8.153.38.116:8848}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

# JWT 密钥需与 im-connect 保持一致（HS256，至少 32 字节）
im:
  jwt:
    secret: ${IM_JWT_SECRET:im-p0-shared-secret-please-change-in-prod-0123456789}
    expire-millis: 604800000   # 7 天
