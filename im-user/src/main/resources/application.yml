server:
  port: 8081

spring:
  application:
    name: im-user
  profiles:
    # K8s 部署时 SPRING_PROFILES_ACTIVE 由 ConfigMap 注入；本地用 default
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    # 默认 8.153.38.116（用户物理机）：本地 docker-compose / K8s 部署都连这台
    # K8s 部署时 ConfigMap 会覆盖成相同值（保持兼容）
    url: jdbc:mysql://${DB_HOST:8.153.38.116}:${DB_PORT:3306}/im_user?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Admin_1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:8.153.38.116:8848}
        namespace: ${NACOS_NAMESPACE:}

# Spring Boot Actuator - K8s 健康探针
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        readiness:
          include: readinessState,db,nacosDiscovery
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

# JWT 密钥需与 im-connect / im-gateway 保持一致（HS256，至少 32 字节）
im:
  jwt:
    secret: ${IM_JWT_SECRET:im-p0-shared-secret-please-change-in-prod-0123456789}
    expire-millis: 604800000   # 7 天
