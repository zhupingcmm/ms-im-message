server:
  port: 8080

spring:
  application:
    name: im-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:8.153.38.116:8848}
        namespace: ${NACOS_NAMESPACE:}
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: im-user-auth
          uri: lb://im-user
          predicates:
            - Path=/auth/**
        - id: im-user
          uri: lb://im-user
          predicates:
            - Path=/users/**
        - id: im-message
          uri: lb://im-message
          predicates:
            - Path=/messages/**,/conversations/**,/sync/**
        - id: im-media
          uri: lb://im-media
          predicates:
            - Path=/media/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

# Spring Boot Actuator - K8s 健康探针
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        readiness:
          include: readinessState,nacosDiscovery

# JWT 共享密钥，需与 im-user / im-connect 一致
im:
  jwt:
    secret: ${IM_JWT_SECRET:im-p0-shared-secret-please-change-in-prod-0123456789}
    expire-millis: 604800000
