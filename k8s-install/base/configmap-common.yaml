# 外部中间件寻址（用户已在 8.153.38.116 物理机部署 MySQL/Redis/Nacos/Kafka/MinIO）
# 应用 Pod → 通过 NodePort / 内网路由 / SNAT 访问外部 IP
# 如果 K8s 集群与该 IP 不在同一内网，需要：
#   1. 集群 Node 能路由到 8.153.38.116（验证：kubectl run -it --rm debug --image=busybox -- ping 8.153.38.116）
#   2. 防火墙放行 3306/6379/8848/9848/9092/9000 端口
apiVersion: v1
kind: ConfigMap
metadata:
  name: im-config
  namespace: im
data:
  # Spring
  SPRING_PROFILES_ACTIVE: "k8s"

  # ---- 外部中间件地址（单台物理机 8.153.38.116）----
  NACOS_ADDR: "8.153.38.116:8848"
  NACOS_NAMESPACE: "im-prod"

  DB_HOST: "8.153.38.116"
  DB_PORT: "3306"
  DB_USERNAME: "im_app"

  REDIS_HOST: "8.153.38.116"
  REDIS_PORT: "6379"
  # REDIS_PASSWORD 放 Secret（生产环境必填）

  KAFKA_SERVERS: "8.153.38.116:9092"

  MINIO_ENDPOINT: "http://8.153.38.116:9000"
  MINIO_BUCKET: "im-media"
  # MINIO_ACCESS_KEY / MINIO_SECRET_KEY 放 Secret

  # Netty
  IM_NETTY_PORT: "8091"
  IM_NETTY_PATH: "/ws"
  IM_HEARTBEAT_SECONDS: "60"

  # 雪花 ID
  IM_SNOWFLAKE_WORKER_ID: "1"

  # JVM（容器感知）
  JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError -Djava.security.egd=file:/dev/./urandom"
