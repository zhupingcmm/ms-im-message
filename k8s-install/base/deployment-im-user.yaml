apiVersion: apps/v1
kind: Deployment
metadata:
  name: im-user
  namespace: im
  labels:
    app: im-user
spec:
  replicas: 2
  selector:
    matchLabels:
      app: im-user
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: im-user
    spec:
      serviceAccountName: im-app
      containers:
        - name: im-user
          image: im-user:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: im-config
            - configMapRef:
                name: im-user-cm
            - secretRef:
                name: im-middleware-secret   # DB_PASSWORD / MINIO_* / REDIS_PASSWORD
            - secretRef:
                name: im-jwt-secret          # IM_JWT_SECRET
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1500m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
