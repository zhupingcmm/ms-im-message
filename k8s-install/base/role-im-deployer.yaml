# 限定 namespace 的 deployer 权限（CI/CD 用），不给 cluster-admin
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: im-deployer
  namespace: im
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - secrets
      - services
      - pods
      - pods/log
      - pods/exec
      - endpoints
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - replicasets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
