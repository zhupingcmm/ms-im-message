# Secret: im-middleware-secret
#
# 外部中间件（8.153.38.116）的所有连接凭据 —— 一个 Secret 集中管理。
# 真实值由 ./scripts/render-secrets.sh 一次性写入，不入 Git。
#
# 字段说明：
#   DB_PASSWORD       im-app 业务账号密码（被 im-user / im-message 引用）
#   MINIO_ACCESS_KEY  MinIO access key（被 im-media / im-message / im-push 引用）
#   MINIO_SECRET_KEY  MinIO secret key
#   REDIS_PASSWORD    Redis 密码（无密码时留空，被 im-connect / im-message 引用）
#
# 注意：JWT 密钥单独放在 im-jwt-secret —— 因为它与应用算法有关，与外部中间件无关。
apiVersion: v1
kind: Secret
metadata:
  name: im-middleware-secret
  namespace: im
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_ME"
  MINIO_ACCESS_KEY: "REPLACE_ME"
  MINIO_SECRET_KEY: "REPLACE_ME"
  REDIS_PASSWORD: ""
