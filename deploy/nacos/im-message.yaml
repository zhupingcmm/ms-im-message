# =============================================================================
# Nacos 配置中心 - im-message 专属配置 (data-id: im-message.yaml)
#
# 导入方式同 common.yaml：控制台 > 配置管理 > 新建配置
#   Data ID: im-message.yaml  Group: DEFAULT_GROUP  格式: YAML
#   Namespace: im-prod
# =============================================================================
spring:
  datasource:
    # 账号/密码/驱动在 common.yaml 共享，此处只声明本服务自己的库
    # 实际 host 由环境变量 DB_HOST 注入（K8s ConfigMap im-config）
    url: jdbc:mysql://${DB_HOST:}:${DB_PORT:3306}/im_message?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
