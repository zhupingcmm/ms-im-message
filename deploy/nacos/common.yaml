# =============================================================================
# Nacos 配置中心 - 共享配置 (data-id: common.yaml)
#
# 这是配置中心内容的「版本化副本」，仓库不直接加载它。
# 部署时需把本文件内容导入 Nacos：
#   控制台 > 配置管理 > 配置列表 > 新建配置
#     Data ID: common.yaml
#     Group:   DEFAULT_GROUP
#     Namespace: 与各服务 NACOS_NAMESPACE 一致（如 public / prod）
#     配置格式: YAML
#   把下面的内容粘贴进去并发布。
#
# 敏感值（密码、密钥）用 ${ENV} 占位，真实值由各服务部署环境的环境变量注入，
# 因此 Nacos 中也不出现明文。
# =============================================================================
spring:
  datasource:
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Admin_1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:8.153.38.116}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_ADDR:8.153.38.116:9092}

# JWT 密钥需在 im-user 与 im-connect 间保持一致（HS256，至少 32 字节）
# 集中放在这里后，两端自动一致，无需手动同步
im:
  jwt:
    secret: ${JWT_SECRET:im-p0-shared-secret-please-change-in-prod-0123456789}
    expire-millis: 604800000   # 7 天
