# =============================================================================
# Nacos 配置中心 - 共享配置 (data-id: common.yaml)
#
# 这是配置中心内容的「版本化副本」，仓库不直接加载它。
# 部署时需把本文件内容导入 Nacos：
#   控制台 > 配置管理 > 配置列表 > 新建配置
#     Data ID: common.yaml
#     Group:   DEFAULT_GROUP
#     Namespace: 与各服务 NACOS_NAMESPACE 一致（如 im-prod）
#     配置格式: YAML
#   把下面的内容粘贴进去并发布。
#
# 敏感值（密码、密钥）用 ${ENV} 占位，真实值由 K8s Secret 注入。
# 本文件中所有 8.153.38.116 兜底已删除——必须由 Nacos namespace 里的环境变量或
# 共享 ConfigMap 覆盖，否则会启动失败（这是有意的，防止"忘记改 IP"事故）。
# =============================================================================
spring:
  datasource:
    username: ${DB_USERNAME:im_app}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_ADDR:}

# JWT 共享密钥（im-user / im-connect / im-gateway 三者必须一致）
# 真实值由 K8s Secret im-jwt-secret 注入 IM_JWT_SECRET env
im:
  jwt:
    secret: ${IM_JWT_SECRET:}
    expire-millis: 604800000   # 7 天
