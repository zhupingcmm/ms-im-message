server:
  port: 8083

spring:
  application:
    name: im-connect
  config:
    import:
      # 从 Nacos 导入共享配置（Redis/Kafka/JWT）
      - optional:nacos:common.yaml?refresh=true
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:8.153.38.116:8848}
      config:
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yaml
      discovery:
        namespace: ${NACOS_NAMESPACE:public}
  kafka:
    # bootstrap-servers 在 common.yaml；此处只放本服务的 consumer 配置
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest

# JWT 在 Nacos common.yaml 共享，im-user / im-connect 自动一致
# 下面是本地兜底默认值，Nacos 连接成功后会被覆盖
im:
  jwt:
    secret: im-p0-shared-secret-please-change-in-prod-0123456789
    expire-millis: 604800000
  gateway:
    id: im-connect-1          # 本网关实例ID（也用作 Kafka 广播消费组）
  netty:
    port: 8091               # WebSocket 监听端口
    path: /ws
