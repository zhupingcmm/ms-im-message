server:
  port: 8083

spring:
  application:
    name: im-connect
  config:
    import:
      # 从 Nacos 导入共享配置（Redis/Kafka/JWT）
      # 暂时禁用，使用本地配置测试
      # - optional:nacos:common.yaml?refresh=true
  data:
    redis:
      host: 8.153.38.116
      port: 6379
      password: Admin_1234
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  kafka:
    bootstrap-servers: 8.153.38.116:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest

# JWT 在 Nacos common.yaml 共享，im-user / im-connect 自动一致
# 下面是本地兜底默认值，Nacos 连接成功后会被覆盖
im:
  jwt:
    secret: im-p0-shared-secret-please-change-in-prod-0123456789
    expire-millis: 604800000
  gateway:
    id: im-connect-1          # 本网关实例ID（也用作 Kafka 广播消费组）
  netty:
    port: 8091               # WebSocket 监听端口
    path: /ws
