server:
  port: 8082

spring:
  application:
    name: im-message
  datasource:
    url: jdbc:mysql://${DB_HOST:8.153.38.116:3306}/im_message?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Admin_1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # max-lifetime 必须小于 MySQL 的 wait_timeout，避免拿到被服务端关闭的连接
      max-lifetime: 600000        # 10 分钟
      keepalive-time: 120000      # 2 分钟主动探活空闲连接（Hikari 4.0+）
      connection-timeout: 30000
      validation-timeout: 5000
      minimum-idle: 5
      maximum-pool-size: 20
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:8.153.38.116}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:8.153.38.116:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:8.153.38.116:8848}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

im:
  snowflake:
    worker-id: 1
